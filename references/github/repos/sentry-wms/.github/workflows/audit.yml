name: Dependency Audit

# Dependency Audit
#
# This workflow gates merges on dependency vulnerabilities. Two patterns
# are used for explicitly-deferred advisories:
#
# 1. pip-audit: --ignore-vuln <GHSA> with inline comment naming the
#    deferred issue. When the issue closes (dep is upgraded), remove
#    the ignore line.
#
# 2. npm audit (dev deps): step-level continue-on-error: true. Dev-tree
#    advisories are reported as warnings but do not block the merge.
#    Production-tree advisories (--omit=dev) DO block the merge.
#
# When deferring a new advisory, file a v1.5 issue and reference it
# in the inline comment. The ignore should never outlive the issue.
#
# Introduced by V-042 (#39). Nightly schedule catches newly-disclosed
# advisories even when no code changed.

on:
  push:
    branches: ["**"]
  pull_request:
  schedule:
    - cron: "17 6 * * *"

jobs:
  pip-audit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install pip-audit
        run: pip install pip-audit==2.7.3

      - name: Audit Python dependencies
        # Fails on any advisory at or above high severity. --strict makes
        # the command exit non-zero when vulnerabilities are found rather
        # than only on tooling errors.
        #
        # v1.5.1: every v1.4-deferred --ignore-vuln is resolved.
        # cryptography 44 -> 46.0.7 (#59) drops GHSA-r6ph-v2qm-q3c2
        # and GHSA-m959-cc7f-wv43; pytest 8 -> 9 (#60) drops
        # GHSA-6w46-j5rx-g56g.
        #
        # v1.13.0 deferrals (no upstream fix available yet):
        # - PYSEC-2024-271 (flask-cors): log-injection-when-debug-logging.
        #   Bumped 6.0.0 -> 6.0.2 (latest) for defense in depth, but OSV
        #   still flags 6.x. Production runs at INFO log level, so the
        #   debug-only CRLF injection vector is not reachable. Remove
        #   when upstream ships a fix.
        # - PYSEC-2025-183 (pyjwt): vendor-disputed; "key length is
        #   chosen by the application using the library." Our JWT signing
        #   secret is generated via secrets.token_urlsafe(>=32), so the
        #   weak-default-key concern does not apply. Remove when the
        #   advisory is withdrawn or upstream pins a min-key-length.
        run: |
          pip-audit \
            --requirement api/requirements.txt \
            --strict \
            --vulnerability-service osv \
            --ignore-vuln PYSEC-2024-271 \
            --ignore-vuln PYSEC-2025-183

  npm-audit-admin:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: admin
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: admin/package-lock.json

      - name: Install admin dependencies
        run: npm ci --ignore-scripts

      - name: Audit admin dependencies
        run: npm audit --audit-level=high

  npm-audit-mobile:
    # Gating audit: production dependencies only. eas-cli and its
    # transitive tree are devDependencies used at build time, not shipped
    # on the device, so their advisories (tracked separately under the
    # deferred v1.5 eas-cli upgrade) should not block merges here.
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: mobile
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: mobile/package-lock.json

      - name: Install mobile dependencies
        run: npm ci --ignore-scripts

      - name: Audit mobile production dependencies
        run: npm audit --omit=dev --audit-level=high

  npm-audit-mobile-dev:
    # Gating audit: full tree including devDependencies. v1.4-deferred
    # eas-cli dev-tree highs (minimatch + node-forge) were closed in
    # v1.5.1 (#61) via overrides, so this job is no longer
    # informational -- high-severity advisories anywhere in the
    # mobile tree now block merges, matching the prod-tree job's
    # behaviour.
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: mobile
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: mobile/package-lock.json

      - name: Install mobile dependencies
        run: npm ci --ignore-scripts

      - name: Audit mobile full dependency tree
        run: npm audit --audit-level=high
