<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Feature Map</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0 }
  html, body { width: 100%; height: 100%; overflow: hidden }
  body {
    font-family: -apple-system, BlinkMacSystemFont, "SF Pro Text", Inter, Roboto, sans-serif;
    background: #f5f5f7;
  }
  svg {
    display: block;
    width: 100%;
    height: 100%;
    cursor: grab;
  }
  svg:active { cursor: grabbing }
  .node circle {
    fill: #0071e3;
    stroke: #fff;
    stroke-width: 2;
    cursor: pointer;
    transition: fill .2s;
  }
  .node circle:hover { fill: #2997ff }
  .node circle.folded { fill: #aeaeb2; stroke: none }
  .node circle.leaf { fill: #0071e3; cursor: default; opacity: .4 }
  .node text {
    font-family: -apple-system, BlinkMacSystemFont, "SF Pro Text", Inter, Roboto, sans-serif;
    fill: #1d1d1f;
  }
  .link {
    fill: none;
    stroke: #aeaeb2;
    stroke-width: 1.5;
  }
</style>
</head>
<body>
<svg id="tree"></svg>
<script src="https://cdn.jsdelivr.net/npm/d3@7/dist/d3.min.js"></script>

      { name: 'Unit (mockery + testify)' },

    ]},
    { name: 'Аналитика', children: [
      { name: 'Дашборды (Grafana)' },
      { name: 'Отчёты (выручка, заказы, конверсия)' },
      { name: 'Метрики (DAU/MAU, время сборки, ETA, топ товаров)' },
    ]},
  ]

var g = svg.append('g');

function measureTextWidth(text) {
  var t = svg.append('text').text(text).style('font-size', '12px').style('font-weight', '600');
  var w = t.node().getComputedTextLength();
  t.remove();
  return w;
}

var zoom = d3.zoom()
  .scaleExtent([0.05, 4])
  .on('zoom', function(e) { g.attr('transform', e.transform); });

svg.call(zoom);

var root = d3.hierarchy(data);
var viewW = window.innerWidth;
var viewH = window.innerHeight;

function autoFit() {
  var bounds = g.node().getBBox();
  if (!bounds.width) return;
  var pad = 40;
  var scale = Math.min((viewW - pad * 2) / bounds.width, (viewH - pad * 2) / bounds.height, 2);
  scale = Math.max(scale, 0.08);
  var tx = (viewW - bounds.width * scale) / 2 - bounds.x * scale;
  var ty = (viewH - bounds.height * scale) / 2 - bounds.y * scale;
  svg.transition().duration(500).call(zoom.transform, d3.zoomIdentity.translate(tx, ty).scale(scale));
}

var durations = [400];

function update(source) {
  var duration = durations[0];

  // Depth spacing
  root.each(function(d) { d.y = d.depth * 80; });

  // Horizontal spacing based on longest label
  var maxW = 0;
  root.each(function(d) { var w = measureTextWidth(d.data.name); if (w > maxW) maxW = w; });
  var hSpacing = Math.max(maxW + 60, 200);

  var treeLayout = d3.tree()
    .nodeSize([hSpacing, 0])
    .separation(function(a, b) { return a.parent === b.parent ? 1 : 1.3; });
  treeLayout(root);

  // Nodes
  var node = g.selectAll('g.node')
    .data(root.descendants(), function(d) { return d.data.name; });

  var nodeEnter = node.enter().append('g')
    .attr('class', 'node')
    .attr('transform', function(d) { return 'translate(' + source.x0 + ',' + source.y0 + ')'; });

  nodeEnter.append('circle')
    .attr('r', 0)
    .on('click', function(e, d) {
      toggle(d);
      update(d);
    });

  nodeEnter.append('text')
    .attr('dy', '.35em')
    .style('opacity', 0);

  var nodeMerge = nodeEnter.merge(node);

  nodeMerge.transition().duration(duration)
    .attr('transform', function(d) { return 'translate(' + d.x + ',' + d.y + ')'; });

  nodeMerge.select('circle')
    .attr('r', function(d) {
      return d.children || d._children ? 6 : 3;
    })
    .attr('class', function(d) {
      if (!d.children && !d._children) return 'leaf';
      if (d._children) return 'folded';
      return '';
    });

  nodeMerge.select('text')
    .text(function(d) { return d.data.name; })
    .style('opacity', 1)
    .attr('x', 12)
    .attr('y', 5)
    .style('font-size', function(d) { return d.depth === 0 ? '14px' : '12px'; })
    .style('font-weight', function(d) { return d.depth === 0 ? '700' : d.depth === 1 ? '600' : '400'; });

  var nodeExit = node.exit().transition().duration(duration)
    .attr('transform', function(d) { return 'translate(' + source.x + ',' + source.y + ')'; })
    .remove();

  nodeExit.select('circle').attr('r', 0);
  nodeExit.select('text').style('opacity', 0);

  // Links
  var link = g.selectAll('path.link')
    .data(root.links(), function(d) { return d.target.data.name; });

  var linkEnter = link.enter().insert('path', 'g')
    .attr('class', 'link')
    .attr('d', function(d) {
      var o = { x: source.x0, y: source.y0 };
      return diagonal(o, o);
    });

  linkEnter.merge(link).transition().duration(duration)
    .attr('d', function(d) {
      return diagonal(d.source, d.target);
    });

  link.exit().transition().duration(duration)
    .attr('d', function(d) {
      var o = { x: source.x, y: source.y };
      return diagonal(o, o);
    })
    .remove();

  // Store old positions
  root.eachBefore(function(d) {
    d.x0 = d.x;
    d.y0 = d.y;
  });

  // Auto-fit after render
  setTimeout(autoFit, duration + 50);
}

function diagonal(s, t) {
  var hx = (s.x + t.x) / 2;
  return 'M' + s.x + ',' + s.y
    + 'C' + hx + ',' + s.y
    + ' ' + hx + ',' + t.y
    + ' ' + t.x + ',' + t.y;
}

function toggle(d) {
  if (d.children) {
    d._children = d.children;
    d.children = null;
  } else if (d._children) {
    d.children = d._children;
    d._children = null;
  }
}

window.addEventListener('resize', function () {
  viewW = window.innerWidth;
  viewH = window.innerHeight;
  autoFit();
});

root.x0 = 0;
root.y0 = 0;
update(root);

function toggle(d) {
  if (d.children) {
    d._children = d.children;
    d.children = null;
  } else if (d._children) {
    d.children = d._children;
    d._children = null;
  }
}

// Initialize
root.x0 = 0;
root.y0 = 0;
update(root);
</script>
</body>
</html>
