<style>
:root {
  --bg: #0a0a0f;
  --bg-panel: #12121a;
  --bg-hover: #1c1c2a;
  --text: #e8e8ed;
  --text-dim: #6b6b83;
  --border: #262636;
  --accent: #6366f1;
  --shadow: 0 4px 24px rgba(0,0,0,0.5);
  --radius: 10px;
  --font: -apple-system, BlinkMacSystemFont, "SF Pro Text", Inter, Roboto, sans-serif;
}
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0 }
html, body { width: 100%; height: 100%; overflow: hidden }
body {
  font-family: var(--font);
  background: var(--bg);
  color: var(--text);
}
svg {
  display: block;
  width: 100%;
  height: 100%;
  cursor: grab;
  -webkit-user-select: none;
  user-select: none;
}
svg:active { cursor: grabbing }

/* Nodes */
.node { cursor: pointer; outline: none; }
.node:focus-visible circle { stroke: #fff !important; stroke-width: 3 !important; }
.node circle {
  stroke: rgba(255,255,255,0.12);
  stroke-width: 2;
  transition: fill .2s, stroke .2s, opacity .2s;
}
.node circle:hover { stroke: rgba(255,255,255,0.5); }
.node circle.folded { opacity: 0.7 }
.node circle.leaf { cursor: default; opacity: 0.65 }
.node circle.leaf:hover { opacity: 0.9 }
.node circle.matched {
  stroke: #fff;
  stroke-width: 3;
  filter: drop-shadow(0 0 8px currentColor);
}

.node text {
  fill: var(--text);
  pointer-events: none;
  text-shadow: 0 1px 6px rgba(0,0,0,0.7);
}
.node text.matched { fill: #fff; font-weight: 700 !important; }

/* Links */
.link {
  fill: none;
  stroke: #22223a;
  stroke-width: 1.5;
  opacity: 0.5;
  transition: stroke .3s;
}

/* Tooltip */
#tooltip {
  position: fixed;
  display: none;
  background: var(--bg-panel);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 10px 14px;
  font-size: 13px;
  line-height: 1.5;
  max-width: 320px;
  pointer-events: none;
  z-index: 1000;
  box-shadow: var(--shadow);
  backdrop-filter: blur(20px);
  -webkit-backdrop-filter: blur(20px);
}
#tooltip.show { display: block }
#tooltip .tt-cat { font-size: 10px; font-weight: 600; letter-spacing: 0.5px; margin-bottom: 2px; }
#tooltip .tt-name { font-size: 14px; font-weight: 700; margin-bottom: 2px; }
#tooltip .tt-desc { color: var(--text-dim); font-size: 12px; }

/* Breadcrumb */
#breadcrumb {
  position: fixed;
  top: 16px;
  left: 50%;
  transform: translateX(-50%);
  background: var(--bg-panel);
  border: 1px solid var(--border);
  border-radius: 20px;
  padding: 5px 16px;
  font-size: 12px;
  color: var(--text-dim);
  z-index: 100;
  backdrop-filter: blur(20px);
  -webkit-backdrop-filter: blur(20px);
  box-shadow: var(--shadow);
  white-space: nowrap;
  max-width: 50vw;
  overflow: hidden;
  text-overflow: ellipsis;
  pointer-events: none;
  opacity: 0;
  transition: opacity .3s;
}
#breadcrumb.show { opacity: 1 }
#breadcrumb .bc-sep { margin: 0 6px; color: var(--border); font-size: 14px; }
#breadcrumb .bc-current { color: var(--accent); font-weight: 600; }

/* Zoom controls */
#controls {
  position: fixed;
  top: 16px;
  right: 16px;
  display: flex;
  flex-direction: column;
  gap: 5px;
  z-index: 200;
}
#controls button {
  width: 34px;
  height: 34px;
  border: 1px solid var(--border);
  border-radius: 8px;
  background: var(--bg-panel);
  color: var(--text);
  font-size: 14px;
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
  transition: background .12s, border-color .12s, transform .1s;
  backdrop-filter: blur(16px);
  -webkit-backdrop-filter: blur(16px);
  box-shadow: var(--shadow);
}
#controls button:hover { background: var(--bg-hover); border-color: var(--accent); color: #fff; }
#controls button:active { transform: scale(0.9); }

/* Search */
#search-wrap {
  position: fixed;
  top: 16px;
  left: 16px;
  z-index: 200;
  display: flex;
  gap: 6px;
  align-items: center;
}
#search-input {
  width: 220px;
  padding: 7px 14px;
  border: 1px solid var(--border);
  border-radius: 20px;
  background: var(--bg-panel);
  color: var(--text);
  font-size: 13px;
  font-family: var(--font);
  outline: none;
  backdrop-filter: blur(16px);
  -webkit-backdrop-filter: blur(16px);
  box-shadow: var(--shadow);
  transition: border-color .15s;
}
#search-input:focus { border-color: var(--accent) }
#search-input::placeholder { color: var(--text-dim) }
#search-clear {
  display: none;
  width: 30px;
  height: 30px;
  border: 1px solid var(--border);
  border-radius: 50%;
  background: var(--bg-panel);
  color: var(--text-dim);
  font-size: 12px;
  cursor: pointer;
  align-items: center;
  justify-content: center;
  backdrop-filter: blur(16px);
  -webkit-backdrop-filter: blur(16px);
  box-shadow: var(--shadow);
}
#search-clear:hover { border-color: var(--accent); color: var(--text); }
#search-count {
  display: none;
  position: fixed;
  top: 56px;
  left: 16px;
  font-size: 11px;
  color: var(--text-dim);
  background: var(--bg-panel);
  padding: 3px 12px;
  border-radius: 12px;
  border: 1px solid var(--border);
  z-index: 200;
}

/* Legend */
#legend-toggle, #legend-close {
  position: fixed;
  bottom: 16px;
  right: 16px;
  z-index: 200;
  width: 40px;
  height: 40px;
  border: 1px solid var(--border);
  border-radius: 50%;
  background: var(--bg-panel);
  color: var(--text);
  font-size: 18px;
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
  backdrop-filter: blur(16px);
  -webkit-backdrop-filter: blur(16px);
  box-shadow: var(--shadow);
  transition: background .12s, transform .1s;
}
#legend-toggle:hover { background: var(--bg-hover); border-color: var(--accent); }
#legend-toggle:active, #legend-close:active { transform: scale(0.9); }
#legend-toggle.active { border-color: var(--accent); background: var(--accent); }

#legend {
  position: fixed;
  bottom: 64px;
  right: 16px;
  z-index: 200;
  background: var(--bg-panel);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 14px 16px;
  min-width: 220px;
  max-height: 60vh;
  overflow-y: auto;
  backdrop-filter: blur(20px);
  -webkit-backdrop-filter: blur(20px);
  box-shadow: var(--shadow);
  transform-origin: bottom right;
  opacity: 0;
  pointer-events: none;
  transition: opacity .15s;
}
#legend.show { opacity: 1; pointer-events: auto; }
#legend .lg-title { font-size: 10px; font-weight: 600; text-transform: uppercase; letter-spacing: 1px; color: var(--text-dim); margin-bottom: 8px; }
#legend .lg-item {
  display: flex; align-items: center; gap: 8px;
  padding: 4px 0; font-size: 12px; cursor: pointer;
  border-radius: 4px; transition: color .12s;
}
#legend .lg-item:hover { color: var(--accent); }
#legend .lg-item .lg-dot { width: 10px; height: 10px; border-radius: 50%; flex-shrink: 0; border: 1px solid rgba(255,255,255,0.08); }
#legend .lg-item .lg-emoji { font-size: 13px; flex-shrink: 0; }
#legend .lg-item .lg-name { flex: 1; }
#legend .lg-item .lg-count { font-size: 10px; color: var(--text-dim); }

/* Status bar */
#status {
  position: fixed;
  bottom: 16px;
  left: 50%;
  transform: translateX(-50%);
  font-size: 10px;
  color: var(--text-dim);
  background: var(--bg-panel);
  padding: 3px 12px;
  border-radius: 12px;
  border: 1px solid var(--border);
  z-index: 100;
  white-space: nowrap;
  backdrop-filter: blur(16px);
  -webkit-backdrop-filter: blur(16px);
}

/* Hint */
#hint {
  position: fixed;
  bottom: 50px;
  left: 50%;
  transform: translateX(-50%);
  font-size: 11px;
  color: var(--text-dim);
  opacity: 0.5;
  z-index: 99;
  pointer-events: none;
  text-align: center;
  transition: opacity 1s;
}

/* Responsive */
@media (max-width: 768px) {
  #search-input { width: 160px; font-size: 12px; padding: 6px 12px; }
  #breadcrumb { font-size: 10px; padding: 4px 12px; max-width: 40vw; top: 12px; }
  #controls { top: 12px; right: 12px; gap: 4px; }
  #controls button { width: 30px; height: 30px; font-size: 12px; border-radius: 6px; }
  #legend-toggle { width: 36px; height: 36px; font-size: 16px; bottom: 12px; right: 12px; }
  #legend { right: 12px; bottom: 56px; min-width: 180px; }
  #status { font-size: 9px; padding: 2px 10px; }
  #hint { font-size: 10px; bottom: 44px; }
  #search-count { font-size: 10px; top: 52px; left: 12px; padding: 2px 10px; }
}
@media (max-width: 480px) {
  #search-wrap { left: 8px; top: 12px; }
  #search-input { width: 120px; font-size: 11px; }
  #breadcrumb { display: none; }
  #controls { top: 12px; right: 8px; }
  #controls button { width: 28px; height: 28px; font-size: 11px; border-radius: 5px; }
  #legend { right: 8px; min-width: 150px; max-height: 50vh; }
}
</style>
</head>

      ]},
      { name: '💰 Dynamic Pricing', cat: 'pricing', desc: 'Динамическое ценообразование на основе множества факторов', children: [
        { name: 'Факторы', desc: 'Загрузка, время, погода, расстояние, вес корзины' },
        { name: 'Формула', desc: 'base_fee × product(multipliers) — мультипликативная модель' },
        { name: 'Max надбавка: 2×', desc: 'Максимальный коэффициент наценки — 2×' },
        { name: 'Отображение в корзине', desc: 'Показ итоговой стоимости до подтверждения заказа' },
      ]},
      { name: '📱 Приложение пикера', cat: 'picker', desc: 'Сборка заказов: FIFO, сканер, замены, offline', children: [
        { name: 'Список заказов (FIFO)', desc: 'Очередь заказов для сборки по принципу FIFO' },
        { name: 'Сканер штрихкодов', desc: 'Сканирование товаров через Scandit SDK' },
        { name: 'Замены товаров', desc: 'Поиск альтернатив при отсутствии товара на полке' },
        { name: 'Звонок клиенту', desc: 'Звонок через скрытый номер для согласования замен' },
        { name: 'Offline-режим', desc: 'Работа через Firestore cache при отсутствии сети' },
        { name: 'Smart Sync Queue', desc: 'Пакетная синхронизация при восстановлении соединения' },
        { name: 'Подтверждение упаковки', desc: 'Фиксация завершения сборки и упаковки заказа' },
      ]},
      { name: '🚀 Приложение курьера', cat: 'courier', desc: 'Навигация, оплата, POD, offline-first', children: [
        { name: 'Multi-stop навигация', desc: 'Маршрут с несколькими точками доставки' },
        { name: 'Offline-режим', desc: 'Hive локальное хранение + Smart Sync' },
        { name: 'Off-route detection', desc: 'Обнаружение отклонения от маршрута' },
        { name: 'Приём оплаты', desc: 'Офлайн hold с синхронизацией при появлении сети' },
        { name: 'Digital Signature', desc: 'Подпись клиента в приложении (Proof of Delivery)' },
        { name: 'Photo POD', desc: 'Фото подтверждения доставки' },
        { name: 'Сканер', desc: 'Сканирование штрихкода заказа перед выдачей' },
        { name: 'Статусы доставки', desc: 'Выехал → на месте → вручено → завершено' },
      ]},
      { name: '🏗️ Инфраструктура', cat: 'infra', desc: 'CI/CD, оркестрация, мониторинг, feature flags', children: [
        { name: 'CI/CD', desc: 'GitHub Actions с тестами в testcontainers' },
        { name: 'Docker → Kubernetes', desc: 'Docker Compose для dev → K8s для production' },
        { name: 'Мониторинг', desc: 'Prometheus + Grafana + Loki + Jaeger' },
        { name: 'Sentry', desc: 'Отслеживание ошибок и краш-репорты' },
        { name: 'Feature flags', desc: 'Flipper / LaunchDarkly для постепенного rollout' },
        { name: 'Rollback', desc: 'Git revert + rolling update для быстрого отката' },
      ]},
      { name: '🧪 Тестирование', cat: 'testing', desc: 'Unit, integration, contract, E2E, load, security', children: [
        { name: 'Unit', desc: 'Mockery + testify для модульного тестирования' },
        { name: 'Integration', desc: 'Testcontainers для интеграционных тестов' },
        { name: 'Contract', desc: 'Pact CDC для контрактного тестирования API' },
        { name: 'E2E', desc: 'Cypress для фронтенда + K6 для API-нагрузки' },
        { name: 'Load', desc: 'K6: stress, soak, spike тесты производительности' },
        { name: 'Security', desc: 'SonarCloud + Trivy + Aikido для безопасности кода' },
      ]},
      { name: '📊 Аналитика', cat: 'analytics', desc: 'Дашборды, отчёты, бизнес-метрики', children: [
        { name: 'Дашборды (Grafana)', desc: 'Визуализация ключевых метрик в реальном времени' },
        { name: 'Отчёты', desc: 'Выручка, заказы, конверсия по периодам' },
        { name: 'Метрики', desc: 'DAU/MAU, время сборки, ETA accuracy, топ товаров' },
      ]},
    ]
  };

  // —————————————————————————————————————
  //  INIT
  // —————————————————————————————————————
  var svg = d3.select('#tree');
  var W = window.innerWidth;
  var H = window.innerHeight;
  var g = svg.append('g').attr('class', 'main-group');

  // Root glow
  (function () {
    var defs = svg.append('defs');
    var filter = defs.append('filter').attr('id', 'root-glow');
    filter.append('feGaussianBlur').attr('stdDeviation', '5').attr('result', 'blur');
    var merge = filter.append('feMerge');
    merge.append('feMergeNode').attr('in', 'blur');
    merge.append('feMergeNode').attr('in', 'SourceGraphic');
  })();

  // —————————————————————————————————————
  //  HELPERS
  // —————————————————————————————————————
  var catLookup = {};
  CATEGORIES.forEach(function (c) { catLookup[c.id] = c; });

  function getNodeColor(d) {
    if (d.depth === 0) return '#fbbf24';
    var cat = catLookup[d.data.cat];
    return cat ? cat.color : '#6366f1';
  }

  function nodeMatches(d, q) {
    if (!q || q.length < 2 || d.depth === 0) return false;
    var ql = q.toLowerCase();
    var name = d.data.name.toLowerCase();
    var desc = (d.data.desc || '').toLowerCase();
    return name.indexOf(ql) !== -1 || desc.indexOf(ql) !== -1;
  }

  function getChildren(d) {
    return d.children || d._children || [];
  }

  // —————————————————————————————————————
  //  ZOOM
  // —————————————————————————————————————
  var zoom = d3.zoom()
    .scaleExtent([0.05, 5])
    .on('zoom', function (e) { g.attr('transform', e.transform); });

  svg.call(zoom);

  // —————————————————————————————————————
  //  TREE
  // —————————————————————————————————————
  var root = d3.hierarchy(DATA);
  var searchQuery = '';

  // Start collapsed: only root + category names visible
  root.each(function (d) {
    if (d.depth === 1 && d.children) {
      d._children = d.children;
      d.children = null;
    }
  });

  // —————————————————————————————————————
  //  DOM REFS
  // —————————————————————————————————————
  var tooltipEl = document.getElementById('tooltip');
  var breadcrumbEl = document.getElementById('breadcrumb');
  var searchInput = document.getElementById('search-input');
  var searchClear = document.getElementById('search-clear');
  var searchCount = document.getElementById('search-count');
  var statusEl = document.getElementById('status');
  var legendEl = document.getElementById('legend');
  var legendToggle = document.getElementById('legend-toggle');
  var hintEl = document.getElementById('hint');

  // Hide hint after 6 seconds
  setTimeout(function () { hintEl.style.opacity = '0'; }, 6000);

  // —————————————————————————————————————
  //  LEGEND
  // —————————————————————————————————————
  (function buildLegend() {
    var total = 0;
    DATA.children.forEach(function (d) {
      if (d.children) total += d.children.length;
    });
    var html = '<div class="lg-title">' + total + ' функций · 15 модулей</div>';
    CATEGORIES.forEach(function (c) {
      var count = 0;
      DATA.children.forEach(function (d) {
        if (d.cat === c.id && d.children) count = d.children.length;
      });
      html += '<div class="lg-item" data-cat="' + c.id + '">'
        + '<span class="lg-dot" style="background:' + c.color + '"></span>'
        + '<span class="lg-emoji">' + c.emoji + '</span>'
        + '<span class="lg-name">' + c.name + '</span>'
        + '<span class="lg-count">' + count + '</span>'
        + '</div>';
    });
    legendEl.innerHTML = html;

    legendEl.querySelectorAll('.lg-item').forEach(function (item) {
      item.addEventListener('click', function () {
        var catId = item.getAttribute('data-cat');
        focusCategory(catId);
        closeLegend();
      });
    });
  })();

  function focusCategory(catId) {
    root.each(function (d) {
      if (d.data.cat === catId && d._children) {
        d.children = d._children;
        d._children = null;
      }
    });
    // Also collapse other categories
    root.each(function (d) {
      if (d.data.cat && d.data.cat !== catId && d.children) {
        d._children = d.children;
        d.children = null;
      }
    });
    update(root);
  }

  function closeLegend() {
    legendEl.classList.remove('show');
    legendToggle.classList.remove('active');
  }

  // —————————————————————————————————————
  //  AUTO FIT
  // —————————————————————————————————————
  var vw = W, vh = H;

  function autoFit() {
    var bounds = g.node().getBBox();
    if (!bounds.width || !bounds.height || bounds.width === 0) return;
    var pad = 60;
    var sx = Math.min((vw - pad * 2) / bounds.width, 2);
    var sy = Math.min((vh - pad * 2) / bounds.height, 2);
    var s = Math.min(sx, sy);
    s = Math.max(s, 0.05);
    var tx = (vw - bounds.width * s) / 2 - bounds.x * s;
    var ty = (vh - bounds.height * s) / 2 - bounds.y * s;
    svg.transition().duration(500).call(zoom.transform, d3.zoomIdentity.translate(tx, ty).scale(s));
  }

  // —————————————————————————————————————
  //  RESIZE
  // —————————————————————————————————————
  var resizeTimer;
  window.addEventListener('resize', function () {
    vw = window.innerWidth;
    vh = window.innerHeight;
    clearTimeout(resizeTimer);
    resizeTimer = setTimeout(function () {
      autoFit();
    }, 200);
  });

  // —————————————————————————————————————
  //  UPDATE
  // —————————————————————————————————————
  function update(source) {
    var duration = 400;
    var isSearch = searchQuery.length >= 2;

    // Horizontal layout: left to right
    var treeLayout = d3.tree()
      .nodeSize([50, 0])
      .separation(function (a, b) {
        if (a.depth === 0) return 2;
        return a.parent === b.parent ? 1 : 1.3;
      });
    treeLayout(root);

    // Convert to horizontal: x = depth (left→right), y = tree-computed (top→bottom)
    root.each(function (d) {
      d.y = d.x;
      d.x = d.depth * 250;
    });

    // Status
    var vis = root.descendants().filter(function (d) { return d.depth > 0; }).length;
    var statusText = vis + ' узлов';
    if (isSearch) statusText += ' · поиск: «' + searchQuery + '»';
    statusEl.textContent = statusText;

    // ——— NODES ———
    var node = g.selectAll('g.node')
      .data(root.descendants(), function (d) { return d.data.name; });

    var nodeEnter = node.enter().append('g')
      .attr('class', 'node')
      .attr('tabindex', function (d) { return d.depth > 0 ? 0 : -1; })
      .attr('role', 'treeitem')
      .attr('aria-expanded', function (d) {
        return d.children ? 'true' : d._children ? 'false' : null;
      })
      .attr('aria-label', function (d) {
        return d.data.name + (d.data.desc ? ': ' + d.data.desc : '');
      })
      .attr('transform', function (d) {
        return 'translate(' + source.x0 + ',' + source.y0 + ')';
      });

    nodeEnter.append('circle')
      .attr('r', 0);

    nodeEnter.append('text')
      .attr('dy', '0.35em')
      .style('opacity', 0);

    var nodeMerge = nodeEnter.merge(node);

    nodeMerge.transition().duration(duration)
      .attr('transform', function (d) { return 'translate(' + d.x + ',' + d.y + ')'; });

    // Circle styling
    nodeMerge.select('circle')
      .attr('r', function (d) {
        if (d.depth === 0) return 13;
        return (d.children || d._children) ? 7 : 5;
      })
      .attr('class', function (d) {
        var c = '';
        if (!d.children && !d._children) c += 'leaf';
        else if (d._children) c += 'folded';
        if (isSearch && nodeMatches(d, searchQuery)) c += ' matched';
        return c;
      })
      .style('fill', getNodeColor)
      .style('filter', function (d) { return d.depth === 0 ? 'url(#root-glow)' : 'none'; })
      .style('stroke-width', function (d) { return d.depth === 0 ? 3 : 2; });

    // Text styling
    nodeMerge.select('text')
      .text(function (d) { return d.data.name; })
      .attr('x', function (d) { return d.depth === 0 ? 22 : 14; })
      .attr('y', 4)
      .attr('class', function (d) {
        var c = '';
        if (isSearch && nodeMatches(d, searchQuery)) c += ' matched';
        return c;
      })
      .style('opacity', 1)
      .style('font-size', function (d) {
        return d.depth === 0 ? '16px' : d.depth === 1 ? '13px' : '11px';
      })
      .style('font-weight', function (d) {
        return d.depth === 0 ? '800' : d.depth === 1 ? '700' : '400';
      })
      .style('letter-spacing', function (d) {
        return d.depth > 1 ? '0.3px' : '0';
      });

    // ——— EVENTS ———
    nodeEnter.on('click', function (e, d) {
      if (d.depth === 0) return;
      if (d.children || d._children) {
        toggleNode(d);
        update(d);
      }
    });

    nodeEnter.on('mouseenter', function (e, d) {
      if (d.data.desc) showTooltip(e, d);
    });
    nodeEnter.on('mousemove', function (e) { moveTooltip(e); });
    nodeEnter.on('mouseleave', hideTooltip);

    // Keyboard
    nodeEnter.on('keydown', function (e, d) {
      if (e.key === 'Enter' || e.key === ' ') {
        e.preventDefault();
        if (d.depth > 0 && (d.children || d._children)) {
          toggleNode(d);
          update(d);
        }
      }
      if (e.key === 'ArrowRight' && d._children) {
        e.preventDefault(); toggleNode(d); update(d);
      }
      if (e.key === 'ArrowLeft' && d.children) {
        e.preventDefault(); toggleNode(d); update(d);
      }
      if (e.key === 'ArrowDown') {
        e.preventDefault();
        var nn = g.selectAll('g.node').nodes();
        var idx = nn.indexOf(this);
        if (idx < nn.length - 1) nn[idx + 1].focus();
      }
      if (e.key === 'ArrowUp') {
        e.preventDefault();
        var nn = g.selectAll('g.node').nodes();
        var idx = nn.indexOf(this);
        if (idx > 0) nn[idx - 1].focus();
      }
    });

    // ——— EXIT ———
    var nodeExit = node.exit().transition().duration(duration)
      .attr('transform', function (d) { return 'translate(' + source.x + ',' + source.y + ')'; })
      .remove();
    nodeExit.select('circle').attr('r', 0);
    nodeExit.select('text').style('opacity', 0);

    // ——— LINKS ———
    var link = g.selectAll('path.link')
      .data(root.links(), function (d) { return d.target.data.name; });

    var linkEnter = link.enter().insert('path', 'g')
      .attr('class', 'link')
      .attr('d', function (d) {
        var o = { x: source.x0, y: source.y0 };
        return diagonal(o, o);
      });

    linkEnter.merge(link).transition().duration(duration)
      .attr('d', function (d) { return diagonal(d.source, d.target); })
      .style('stroke', function (d) {
        if (d.target.depth <= 1) return getNodeColor(d.target);
        var cat = catLookup[d.target.data.cat];
        return cat ? cat.color : '#22223a';
      })
      .style('opacity', function (d) {
        return d.target.depth <= 1 ? 0.25 : 0.4;
      });

    link.exit().transition().duration(duration)
      .attr('d', function (d) {
        var o = { x: source.x, y: source.y };
        return diagonal(o, o);
      })
      .remove();

    // ——— STORE ———
    root.eachBefore(function (d) {
      d.x0 = d.x;
      d.y0 = d.y;
    });

    // Breadcrumb
    updateBreadcrumb();

    // Auto fit
    setTimeout(autoFit, duration + 50);
  }

  // —————————————————————————————————————
  //  DIAGONAL
  // —————————————————————————————————————
  function diagonal(s, t) {
    var ox = Math.max((t.x - s.x) * 0.4, 20);
    return 'M' + s.x + ',' + s.y
      + 'C' + (s.x + ox) + ',' + s.y
      + ' ' + (t.x - ox) + ',' + t.y
      + ' ' + t.x + ',' + t.y;
  }

  // —————————————————————————————————————
  //  TOGGLE
  // —————————————————————————————————————
  var lastToggled = null;

  function toggleNode(d) {
    if (d.children) {
      d._children = d.children;
      d.children = null;
      lastToggled = d.parent || null;
    } else if (d._children) {
      d.children = d._children;
      d._children = null;
      lastToggled = d;
    }
  }

  // —————————————————————————————————————
  //  BREADCRUMB
  // —————————————————————————————————————
  function updateBreadcrumb() {
    var node = lastToggled;
    if (!node || node.depth === 0) {
      breadcrumbEl.classList.remove('show');
      return;
    }
    var parts = [];
    var cur = node;
    while (cur) {
      var name = cur.data.name;
      // Strip emoji for breadcrumb
      var clean = name.replace(/^[^\s]+\s/, '');
      parts.unshift(clean);
      cur = cur.parent;
    }
    var html = '';
    parts.forEach(function (p, i) {
      if (i > 0) html += '<span class="bc-sep">›</span>';
      html += '<span' + (i === parts.length - 1 ? ' class="bc-current"' : '') + '>' + p + '</span>';
    });
    breadcrumbEl.innerHTML = html;
    breadcrumbEl.classList.add('show');
  }

  // —————————————————————————————————————
  //  TOOLTIP
  // —————————————————————————————————————
  function showTooltip(e, d) {
    var cat = d.depth > 0 ? catLookup[d.data.cat] : null;
    var html = '';
    if (cat) html += '<div class="tt-cat" style="color:' + cat.color + '">' + cat.emoji + ' ' + cat.name + '</div>';
    html += '<div class="tt-name">' + d.data.name.replace(/^[^\s]+\s/, '') + '</div>';
    if (d.data.desc) html += '<div class="tt-desc">' + d.data.desc + '</div>';
    tooltipEl.innerHTML = html;
    tooltipEl.classList.add('show');
    moveTooltip(e);
  }

  function moveTooltip(e) {
    var x = e.clientX + 14;
    var y = e.clientY - 8;
    var r = tooltipEl.getBoundingClientRect();
    if (x + r.width > window.innerWidth - 8) x = e.clientX - r.width - 14;
    if (y + r.height > window.innerHeight - 8) y = window.innerHeight - r.height - 8;
    if (y < 8) y = 8;
    tooltipEl.style.left = x + 'px';
    tooltipEl.style.top = y + 'px';
  }

  function hideTooltip() {
    tooltipEl.classList.remove('show');
  }

  // —————————————————————————————————————
  //  SEARCH
  // —————————————————————————————————————
  function performSearch(q) {
    searchQuery = q;

    if (q.length >= 2) {
      var ql = q.toLowerCase();

      // Collect matches
      var matchNames = {};
      root.each(function (d) {
        if (nodeMatches(d, q)) {
          matchNames[d.data.name] = true;
          var p = d.parent;
          while (p) {
            matchNames[p.data.name] = true;
            p = p.parent;
          }
        }
      });

      // Expand/collapse accordingly
      root.each(function (d) {
        if (d.depth === 0) return;
        var isMatch = matchNames[d.data.name];
        var hasChildMatch = false;
        if (d.depth === 1 && (d.children || d._children)) {
          var kids = getChildren(d);
          for (var i = 0; i < kids.length; i++) {
            if (matchNames[kids[i].data.name]) { hasChildMatch = true; break; }
          }
        }
        var shouldOpen = isMatch || hasChildMatch;
        if (shouldOpen && d._children) {
          d.children = d._children;
          d._children = null;
        } else if (!shouldOpen && d.children && (d.depth === 1 || (d.depth === 0))) {
          d._children = d.children;
          d.children = null;
        }
      });

      var count = 0;
      root.each(function (d) { if (nodeMatches(d, q)) count++; });
      searchCount.textContent = 'Найдено: ' + count;
      searchCount.style.display = 'block';
      searchClear.style.display = 'flex';
    } else {
      // Reset: collapse all categories
      root.each(function (d) {
        if (d.depth === 1 && d.children) {
          d._children = d.children;
          d.children = null;
        }
      });
      searchCount.style.display = 'none';
      searchClear.style.display = 'none';
    }

    lastToggled = null;
    update(root);
  }

  var searchDebounce;
  searchInput.addEventListener('input', function () {
    clearTimeout(searchDebounce);
    searchDebounce = setTimeout(function () {
      performSearch(searchInput.value.trim());
    }, 200);
  });

  searchClear.addEventListener('click', function () {
    searchInput.value = '';
    searchInput.focus();
    performSearch('');
  });

  // —————————————————————————————————————
  //  CONTROLS
  // —————————————————————————————————————
  document.getElementById('btn-zoom-in').addEventListener('click', function () {
    svg.transition().duration(250).call(zoom.scaleBy, 1.4);
  });
  document.getElementById('btn-zoom-out').addEventListener('click', function () {
    svg.transition().duration(250).call(zoom.scaleBy, 0.7);
  });
  document.getElementById('btn-reset').addEventListener('click', autoFit);
  document.getElementById('btn-collapse-all').addEventListener('click', function () {
    root.each(function (d) {
      if (d.depth === 1 && d.children) {
        d._children = d.children;
        d.children = null;
      }
    });
    lastToggled = null;
    searchInput.value = '';
    performSearch('');
    update(root);
  });
  document.getElementById('btn-expand-all').addEventListener('click', function () {
    root.each(function (d) {
      if (d._children) {
        d.children = d._children;
        d._children = null;
      }
    });
    lastToggled = null;
    searchInput.value = '';
    performSearch('');
    update(root);
  });

  // —————————————————————————————————————
  //  LEGEND TOGGLE
  // —————————————————————————————————————
  legendToggle.addEventListener('click', function () {
    legendEl.classList.toggle('show');
    legendToggle.classList.toggle('active');
  });

  document.addEventListener('click', function (e) {
    if (!legendEl.contains(e.target) && e.target !== legendToggle) {
      closeLegend();
    }
  });

  // —————————————————————————————————————
  //  KEYBOARD
  // —————————————————————————————————————
  document.addEventListener('keydown', function (e) {
    if ((e.ctrlKey && e.key === 'f') || (e.key === '/' && !['INPUT', 'TEXTAREA'].includes(e.target.tagName))) {
      e.preventDefault();
      searchInput.focus();
    }
    if (e.key === 'Escape') {
      if (document.activeElement === searchInput) {
        searchInput.value = '';
        searchInput.blur();
        performSearch('');
      }
      closeLegend();
    }
  });

  // —————————————————————————————————————
  //  GO
  // —————————————————————————————————————
  root.x0 = root.x = 0;
  root.y0 = root.y = 0;
  update(root);

})();
</script>
</body>
</html>
