name: Deploy MkDocs to GitHub Pages

on:
  push:
    branches:
      - main
    paths:
      - 'docs/**'
      - 'mkdocs.yml'
      - 'SRS/SRS.md'
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: 3.x

      - name: Install MkDocs + Material
        run: |
          pip install mkdocs mkdocs-material

      - name: Prepare docs
        run: |
          python3 filter-pdf.py SRS/SRS.md | grep -v '^---$' > /tmp/srs-filtered.md
          python3 -c "
          with open('/tmp/srs-filtered.md') as f:
              content = f.read()
          idx = content.find('# Том 2: Technical Specification')
          with open('docs/docs/tom-1.md', 'w') as f:
              f.write(content[:idx].strip())
          with open('docs/docs/tom-2.md', 'w') as f:
              f.write(content[idx:].strip())
          "
          cp exports/diagrams/diagram-*.png docs/docs/assets/ 2>/dev/null || true
          cp exports/diagrams/feature-map.png docs/docs/assets/ 2>/dev/null || true
          sed -i 's|exports/diagrams/|assets/|g' docs/docs/tom-*.md

      - name: Build site
        run: mkdocs build --site-dir site

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: site

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
