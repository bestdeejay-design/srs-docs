<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Sunburst — Карта функций</title>
<script src="https://cdn.jsdelivr.net/npm/d3@7/dist/d3.min.js"></script>
<style>
* { margin:0; padding:0; box-sizing:border-box }
body { background:#0a0a0f; color:#e8e8ed; font-family:-apple-system,BlinkMacSystemFont,Inter,sans-serif; overflow:hidden; height:100vh }
svg { width:100vw; height:100vh; display:block }
path { cursor:pointer; transition:opacity .15s }
path:hover { opacity:.85 !important }
.tt { position:fixed; display:none; background:#12121a; border:1px solid #262636; border-radius:8px; padding:8px 12px; font-size:12px; max-width:260px; pointer-events:none; z-index:1000 }
.tt.show { display:block }
.tt .n { font-weight:700; font-size:13px; margin-bottom:2px }
.tt .d { color:#6b6b83; font-size:11px }
</style>
</head>
<body>
<svg id="c"></svg>
<div id="t" class="tt"></div>
<script>
var CAT = { security:{clr:'#6366f1'}, catalog:{clr:'#22c55e'}, cart:{clr:'#f59e0b'}, orders:{clr:'#ef4444'}, delivery:{clr:'#3b82f6'}, payments:{clr:'#8b5cf6'}, notify:{clr:'#06b6d4'}, admin:{clr:'#f97316'}, b2b:{clr:'#14b8a6'}, pricing:{clr:'#ec4899'}, picker:{clr:'#84cc16'}, courier:{clr:'#0ea5e9'}, infra:{clr:'#64748b'}, testing:{clr:'#a855f7'}, analytics:{clr:'#10b981'} };
var M = [
  {id:'security',n:'Регистрация и безопасность',f:['Вход по телефону','SMS-подтверждение','Роли (RBAC)','JWT токены','Rate limiting','Audit log']},
  {id:'catalog',n:'Каталог',f:['Выбор магазина','Категории','Поиск (ES)','Фильтры','Карточка товара','Нормализация','Маппинг','Адаптеры','Синхронизация']},
  {id:'cart',n:'Корзина',f:['Добавление','Промокоды','Dynamic Pricing','Пересчёт','Оформление']},
  {id:'orders',n:'Заказы',f:['Создание','Статусы','Добавление после','История','Замена','Возврат','Event Sourcing']},
  {id:'delivery',n:'Доставка',f:['Слоты','Dispatch','ETA','Трекинг','Можно раньше']},
  {id:'payments',n:'Платежи',f:['Т-Банк','СБП (QR)','Карта курьеру','Наличные','Refund','Чек (54-ФЗ)']},
  {id:'notify',n:'Уведомления',f:['Push (FCM)','SMS','Email','Telegram','События']},
  {id:'admin',n:'Админка',f:['Заказы','Товары','Пользователи','Промокоды','Курьеры','Магазины','Сети','Audit log']},
  {id:'b2b',n:'B2B',f:['Корп. заказы','Регулярные','Цены','Отсрочка','ЭДО','Счета']},
  {id:'pricing',n:'Dynamic Pricing',f:['Факторы','Формула','Max 2×','Отображение']},
  {id:'picker',n:'Приложение пикера',f:['FIFO','Сканер','Замены','Звонок','Offline','Smart Sync','Упаковка']},
  {id:'courier',n:'Приложение курьера',f:['Multi-stop','Offline','Off-route','Оплата','Digital Sign.','Photo POD','Сканер','Статусы']},
  {id:'infra',n:'Инфраструктура',f:['CI/CD','Docker/K8s','Мониторинг','Sentry','Feature flags','Rollback']},
  {id:'testing',n:'Тестирование',f:['Unit','Integration','Contract','E2E','Load','Security']},
  {id:'analytics',n:'Аналитика',f:['Дашборды','Отчёты','Метрики']}
];

var W = window.innerWidth, H = window.innerHeight;
var R = Math.min(W, H) / 2 * 0.9;
var svg = d3.select('#c').attr('viewBox', [-W/2, -H/2, W, H]);
var g = svg.append('g');
var tip = document.getElementById('t');
var focusId = null;

function clr(d) {
  while (d.depth > 1) d = d.parent;
  return d.data.id ? (CAT[d.data.id] ? CAT[d.data.id].clr : '#6366f1') : '#fbbf24';
}

function draw() {
  g.selectAll('*').remove();
  var data = {n:'Продукт', children:M.map(function(m) {
    return {n:m.n, id:m.id, children: focusId === m.id ? m.f.map(function(f) { return {n:f}; }) : null};
  })};

  var root = d3.partition().size([2*Math.PI, R]).padding(focusId ? 0.3 : 0.8)(
    d3.hierarchy(data).sum(function(d) { return d.children ? 0 : 1; })
  );

  var arc = d3.arc().startAngle(function(d) { return d.x0; }).endAngle(function(d) { return d.x1; })
    .innerRadius(function(d) { return d.y0; }).outerRadius(function(d) { return d.y1; });

  // Center circle
  var cc = g.append('circle').attr('r', R * 0.12).style('fill','#fbbf24').style('cursor','pointer')
    .style('filter','drop-shadow(0 0 12px #fbbf2480)')
    .on('click', function() { if (focusId) { focusId = null; draw(); } })
    .on('mouseenter', function() {
      tip.innerHTML = '<div class="n">Агрегатор доставки продуктов</div>' + (focusId ? '<div class="d">кликните чтобы вернуться</div>' : '');
      tip.classList.add('show');
    })
    .on('mousemove', function(e) { tip.style.left=(e.clientX+12)+'px'; tip.style.top=(e.clientY-8)+'px'; })
    .on('mouseleave', function() { tip.classList.remove('show'); });

  g.append('text').attr('text-anchor','middle').attr('dy','0.35em')
    .style('fill','#fff').style('font-size','11px').style('font-weight','700').style('pointer-events','none')
    .text(focusId ? '← назад' : 'Продукт');

  root.descendants().filter(function(d) { return d.depth > 0; }).forEach(function(d) {
    var isMod = d.depth === 1, isFeat = d.depth === 2;
    var c = clr(d);
    var p = g.append('path').attr('d', arc(d))
      .style('fill', c).style('stroke', '#0a0a0f').style('stroke-width', isMod ? 2 : 0.5)
      .style('opacity', isFeat ? 0.6 : 0.9);

    if (isMod) {
      p.on('click', function() {
        focusId = focusId === d.data.id ? null : d.data.id;
        draw();
      }).on('mouseenter', function(e) {
        var m = M.find(function(x) { return x.id === d.data.id; });
        tip.innerHTML = '<div class="n">' + d.data.n + '</div><div class="d">' + (m ? m.f.length : '?') + ' функций · кликните чтобы ' + (focusId === d.data.id ? 'свернуть' : 'развернуть') + '</div>';
        tip.classList.add('show');
      }).on('mousemove', function(e) { tip.style.left=(e.clientX+12)+'px'; tip.style.top=(e.clientY-8)+'px'; })
      .on('mouseleave', function() { tip.classList.remove('show'); });

      // Label
      var a = (d.x0+d.x1)/2, r = (d.y0+d.y1)/2;
      g.append('text').attr('transform','rotate('+(a*180/Math.PI-90)+') translate('+r+',0)')
        .attr('text-anchor','middle').attr('dy','0.35em')
        .style('fill','#fff').style('font-size','10px').style('font-weight','700')
        .style('pointer-events','none').style('text-shadow','0 1px 4px rgba(0,0,0,0.9)')
        .text(function() {
          var name = d.data.n;
          var m2 = M.find(function(x) { return x.id === d.data.id; });
          var cnt = m2 ? m2.f.length : 0;
          return name.length > 16 ? name.slice(0,15)+'…' : name;
        });
    }

    if (isFeat) {
      p.on('mouseenter', function(e) {
        tip.innerHTML = '<div class="n">' + d.data.n + '</div>';
        tip.classList.add('show');
      }).on('mousemove', function(e) { tip.style.left=(e.clientX+12)+'px'; tip.style.top=(e.clientY-8)+'px'; })
      .on('mouseleave', function() { tip.classList.remove('show'); });

      if (d.x1 - d.x0 > 0.12 && d.y1 - d.y0 > 6) {
        var fa = (d.x0+d.x1)/2, fr = (d.y0+d.y1)/2;
        g.append('text').attr('transform','rotate('+(fa*180/Math.PI-90)+') translate('+fr+',0)')
          .attr('text-anchor','middle').attr('dy','0.35em')
          .style('fill','#fff').style('font-size','7px').style('pointer-events','none')
          .style('text-shadow','0 1px 3px rgba(0,0,0,0.8)')
          .text(d.data.n.length > 10 ? d.data.n.slice(0,9)+'…' : d.data.n);
      }
    }
  });

  // Legend bottom
  M.forEach(function(m, i) {
    var c = CAT[m.id].clr;
    var cols = 5, row = Math.floor(i/cols), col = i%cols;
    var lx = -W/2 + 20 + col * 220, ly = H/2 - 60 + row * 18;
    g.append('rect').attr('x', lx).attr('y', ly-7).attr('width', 8).attr('height', 8).attr('rx', 2)
      .style('fill', c).style('opacity', 0.7);
    g.append('text').attr('x', lx+12).attr('y', ly).style('fill','#6b6b83').style('font-size','9px')
      .style('pointer-events','none').text(m.n.length > 20 ? m.n.slice(0,19)+'…' : m.n);
  });
}

draw();

window.addEventListener('resize', function() {
  W = window.innerWidth; H = window.innerHeight; R = Math.min(W,H)/2*0.9;
  svg.attr('viewBox', [-W/2, -H/2, W, H]); draw();
});
</script>
</body>
</html>
