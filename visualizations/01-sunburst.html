<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Sunburst — Карта функций</title>
<script src="https://d3js.org/d3.v7.min.js"></script>
<style>
* { margin: 0; padding: 0; box-sizing: border-box }
body { background: #0a0a0f; color: #e8e8ed; font-family: -apple-system, BlinkMacSystemFont, Inter, sans-serif; overflow: hidden; height: 100vh; display: flex; flex-direction: column }
h1 { text-align: center; padding: 12px; font-size: 14px; font-weight: 600; color: #6b6b83; letter-spacing: 0.5px }
svg { flex: 1; display: block }
.tooltip { position: fixed; display: none; background: #12121a; border: 1px solid #262636; border-radius: 8px; padding: 8px 12px; font-size: 12px; max-width: 260px; pointer-events: none; z-index: 1000; backdrop-filter: blur(12px) }
.tooltip.show { display: block }
.tooltip .tt-name { font-weight: 700; font-size: 13px; margin-bottom: 2px }
.tooltip .tt-desc { color: #6b6b83; font-size: 11px }
path { cursor: pointer; transition: opacity .15s }
path:hover { opacity: 0.8 }
</style>
</head>
<body>
<h1>☀️ Sunburst — Карта функциональных требований</h1>
<svg id="chart"></svg>
<div id="tooltip" class="tooltip"></div>
<script>
var CATEGORIES = [
  { id: 'security',  name: 'Регистрация и безопасность', color: '#6366f1' },
  { id: 'catalog',   name: 'Каталог',                    color: '#22c55e' },
  { id: 'cart',      name: 'Корзина',                    color: '#f59e0b' },
  { id: 'orders',    name: 'Заказы',                     color: '#ef4444' },
  { id: 'delivery',  name: 'Доставка',                   color: '#3b82f6' },
  { id: 'payments',  name: 'Платежи',                    color: '#8b5cf6' },
  { id: 'notify',    name: 'Уведомления',                color: '#06b6d4' },
  { id: 'admin',     name: 'Админка',                    color: '#f97316' },
  { id: 'b2b',       name: 'B2B',                        color: '#14b8a6' },
  { id: 'pricing',   name: 'Dynamic Pricing',            color: '#ec4899' },
  { id: 'picker',    name: 'Приложение пикера',          color: '#84cc16' },
  { id: 'courier',   name: 'Приложение курьера',         color: '#0ea5e9' },
  { id: 'infra',     name: 'Инфраструктура',             color: '#64748b' },
  { id: 'testing',   name: 'Тестирование',               color: '#a855f7' },
  { id: 'analytics', name: 'Аналитика',                  color: '#10b981' }
];
var catLookup = {};
CATEGORIES.forEach(function(c) { catLookup[c.id] = c; });

var DATA = {
  name: 'Продукт',
  children: [
    { name: 'Регистрация и безопасность', cat: 'security', children: [
      { name: 'Вход по телефону' }, { name: 'SMS-подтверждение' }, { name: 'Роли: клиент/пикер/курьер/админ/суперадмин' },
      { name: 'JWT access + refresh токены' }, { name: 'Rate limiting' }, { name: 'Audit log' }
    ]},
    { name: 'Каталог', cat: 'catalog', children: [
      { name: 'Выбор магазина по адресу' }, { name: 'Категории (3 уровня)' }, { name: 'Поиск (Elasticsearch)' },
      { name: 'Динамические фильтры' }, { name: 'Карточка товара' }, { name: 'Нормализация данных сетей' },
      { name: 'Маппинг категорий сети → платформа' }, { name: 'Адаптеры сетей' }, { name: 'Синхронизация цен/остатков' }
    ]},
    { name: 'Корзина', cat: 'cart', children: [
      { name: 'Добавление товаров' }, { name: 'Промокоды и баллы' }, { name: 'Dynamic Pricing' },
      { name: 'Пересчёт стоимости' }, { name: 'Оформление' }
    ]},
    { name: 'Заказы', cat: 'orders', children: [
      { name: 'Создание' }, { name: 'Статусы заказа' }, { name: 'Добавление после оформления' },
      { name: 'История заказов' }, { name: 'Замена товара' }, { name: 'Возврат и отмена' }, { name: 'Event Sourcing' }
    ]},
    { name: 'Доставка', cat: 'delivery', children: [
      { name: 'Временные слоты' }, { name: 'Dispatch' }, { name: 'ETA' }, { name: 'Трекинг для клиента' }, { name: 'Опция "Можно раньше"' }
    ]},
    { name: 'Платежи', cat: 'payments', children: [
      { name: 'Т-Банк (онлайн)' }, { name: 'СБП (QR от курьера)' }, { name: 'Карта курьеру (POS)' },
      { name: 'Наличные' }, { name: 'Refund' }, { name: 'Чек (54-ФЗ, ОФД)' }
    ]},
    { name: 'Уведомления', cat: 'notify', children: [
      { name: 'Push (FCM)' }, { name: 'SMS' }, { name: 'Email' }, { name: 'Telegram' }, { name: 'События' }
    ]},
    { name: 'Админка', cat: 'admin', children: [
      { name: 'Управление заказами' }, { name: 'Управление товарами' }, { name: 'Пользователи' },
      { name: 'Промокоды' }, { name: 'Курьеры и пикеры' }, { name: 'Магазины и зоны' },
      { name: 'Управление сетями' }, { name: 'Audit log' }
    ]},
    { name: 'B2B', cat: 'b2b', children: [
      { name: 'Корпоративные заказы' }, { name: 'Регулярные поставки' }, { name: 'Индивидуальные цены' },
      { name: 'Отсрочка платежа' }, { name: 'ЭДО' }, { name: 'Счета и документы' }
    ]},
    { name: 'Dynamic Pricing', cat: 'pricing', children: [
      { name: 'Факторы' }, { name: 'Формула' }, { name: 'Max надбавка: 2×' }, { name: 'Отображение в корзине' }
    ]},
    { name: 'Приложение пикера', cat: 'picker', children: [
      { name: 'Список заказов (FIFO)' }, { name: 'Сканер штрихкодов' }, { name: 'Замены товаров' },
      { name: 'Звонок клиенту' }, { name: 'Offline-режим' }, { name: 'Smart Sync Queue' }, { name: 'Подтверждение упаковки' }
    ]},
    { name: 'Приложение курьера', cat: 'courier', children: [
      { name: 'Multi-stop навигация' }, { name: 'Offline-режим' }, { name: 'Off-route detection' },
      { name: 'Приём оплаты' }, { name: 'Digital Signature' }, { name: 'Photo POD' },
      { name: 'Сканер' }, { name: 'Статусы доставки' }
    ]},
    { name: 'Инфраструктура', cat: 'infra', children: [
      { name: 'CI/CD' }, { name: 'Docker → Kubernetes' }, { name: 'Мониторинг' },
      { name: 'Sentry' }, { name: 'Feature flags' }, { name: 'Rollback' }
    ]},
    { name: 'Тестирование', cat: 'testing', children: [
      { name: 'Unit' }, { name: 'Integration' }, { name: 'Contract' }, { name: 'E2E' }, { name: 'Load' }, { name: 'Security' }
    ]},
    { name: 'Аналитика', cat: 'analytics', children: [
      { name: 'Дашборды (Grafana)' }, { name: 'Отчёты' }, { name: 'Метрики' }
    ]}
  ]
};

var width = window.innerWidth;
var height = window.innerHeight;
var radius = Math.min(width, height) / 2 * 0.85;

var svg = d3.select('#chart')
  .attr('viewBox', [-width/2, -height/2, width, height]);

var root = d3.partition()
  .size([2 * Math.PI, radius])
  .padding(1)(
  d3.hierarchy(DATA)
    .sum(function(d) { return d.children ? 0 : 1; })
    .sort(function(a, b) { return b.value - a.value; })
);

var color = d3.scaleOrdinal()
  .domain(DATA.children.map(function(d) { return d.name; }))
  .range(CATEGORIES.map(function(c) { return c.color; }));

var arc = d3.arc()
  .startAngle(function(d) { return d.x0; })
  .endAngle(function(d) { return d.x1; })
  .padAngle(0.01)
  .padRadius(radius / 2)
  .innerRadius(function(d) { return d.y0; })
  .outerRadius(function(d) { return d.y1 - 1; });

var tooltip = document.getElementById('tooltip');

svg.selectAll('path')
  .data(root.descendants().filter(function(d) { return d.depth > 0; }))
  .join('path')
  .attr('d', arc)
  .style('fill', function(d) {
    while (d.depth > 1) d = d.parent;
    return color(d.data.name);
  })
  .style('stroke', '#0a0a0f')
  .style('stroke-width', 1)
  .style('opacity', function(d) { return d.depth > 1 ? 0.7 : 0.95; })
  .on('mouseenter', function(e, d) {
    var name = d.data.name;
    d3.select(this).style('opacity', 1);
    tooltip.innerHTML = '<div class="tt-name">' + name + '</div>'
      + (d.depth === 1 && d.value ? '<div class="tt-desc">' + d.value + ' функций</div>' : '');
    tooltip.classList.add('show');
  })
  .on('mousemove', function(e) {
    tooltip.style.left = (e.clientX + 12) + 'px';
    tooltip.style.top = (e.clientY - 8) + 'px';
  })
  .on('mouseleave', function() {
    d3.select(this).style('opacity', null);
    tooltip.classList.remove('show');
  });

// Labels on inner arcs (categories)
svg.selectAll('text')
  .data(root.descendants().filter(function(d) { return d.depth === 1 && d.y1 - d.y0 > 30; }))
  .join('text')
  .attr('transform', function(d) {
    var a = (d.x0 + d.x1) / 2;
    var r = (d.y0 + d.y1) / 2;
    return 'rotate(' + (a * 180 / Math.PI - 90) + ') translate(' + r + ',0)';
  })
  .attr('text-anchor', 'middle')
  .attr('dy', '0.35em')
  .style('fill', '#fff')
  .style('font-size', '11px')
  .style('font-weight', '600')
  .style('pointer-events', 'none')
  .text(function(d) { return d.data.name; });
</script>
</body>
</html>
