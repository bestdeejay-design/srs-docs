<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Treemap — Карта функций</title>
<script src="https://d3js.org/d3.v7.min.js"></script>
<style>
* { margin: 0; padding: 0; box-sizing: border-box }
body { background: #0a0a0f; color: #e8e8ed; font-family: -apple-system, BlinkMacSystemFont, Inter, sans-serif; height: 100vh; display: flex; flex-direction: column }
h1 { text-align: center; padding: 12px; font-size: 14px; font-weight: 600; color: #6b6b83; letter-spacing: 0.5px }
svg { flex: 1; display: block }
.tooltip { position: fixed; display: none; background: #12121a; border: 1px solid #262636; border-radius: 8px; padding: 8px 12px; font-size: 12px; max-width: 260px; pointer-events: none; z-index: 1000; backdrop-filter: blur(12px) }
.tooltip.show { display: block }
.tooltip .tt-name { font-weight: 700; font-size: 13px; margin-bottom: 2px }
.tooltip .tt-desc { color: #6b6b83; font-size: 11px }
rect { cursor: pointer; transition: opacity .15s, stroke .15s }
rect:hover { opacity: 0.85; stroke: #fff; stroke-width: 2 }
</style>
</head>
<body>
<h1>🧩 Treemap — Карта функциональных требований</h1>
<svg id="chart"></svg>
<div id="tooltip" class="tooltip"></div>
<script>
var CATEGORIES = [
  { id: 'security',  name: 'Регистрация и безопасность', color: '#6366f1' },
  { id: 'catalog',   name: 'Каталог',                    color: '#22c55e' },
  { id: 'cart',      name: 'Корзина',                    color: '#f59e0b' },
  { id: 'orders',    name: 'Заказы',                     color: '#ef4444' },
  { id: 'delivery',  name: 'Доставка',                   color: '#3b82f6' },
  { id: 'payments',  name: 'Платежи',                    color: '#8b5cf6' },
  { id: 'notify',    name: 'Уведомления',                color: '#06b6d4' },
  { id: 'admin',     name: 'Админка',                    color: '#f97316' },
  { id: 'b2b',       name: 'B2B',                        color: '#14b8a6' },
  { id: 'pricing',   name: 'Dynamic Pricing',            color: '#ec4899' },
  { id: 'picker',    name: 'Приложение пикера',          color: '#84cc16' },
  { id: 'courier',   name: 'Приложение курьера',         color: '#0ea5e9' },
  { id: 'infra',     name: 'Инфраструктура',             color: '#64748b' },
  { id: 'testing',   name: 'Тестирование',               color: '#a855f7' },
  { id: 'analytics', name: 'Аналитика',                  color: '#10b981' }
];
var catLookup = {};
CATEGORIES.forEach(function(c) { catLookup[c.id] = c; });

var DATA = {
  name: 'Продукт',
  children: [
    { name: 'Регистрация и безопасность', cat: 'security', children: [
      { name: 'Вход по телефону' }, { name: 'SMS-подтверждение' }, { name: 'Роли' },
      { name: 'JWT токены' }, { name: 'Rate limiting' }, { name: 'Audit log' }
    ]},
    { name: 'Каталог', cat: 'catalog', children: [
      { name: 'Выбор магазина' }, { name: 'Категории' }, { name: 'Поиск (ES)' },
      { name: 'Динамические фильтры' }, { name: 'Карточка товара' }, { name: 'Нормализация' },
      { name: 'Маппинг категорий' }, { name: 'Адаптеры сетей' }, { name: 'Синхронизация' }
    ]},
    { name: 'Корзина', cat: 'cart', children: [
      { name: 'Добавление товаров' }, { name: 'Промокоды' }, { name: 'Dynamic Pricing' },
      { name: 'Пересчёт стоимости' }, { name: 'Оформление' }
    ]},
    { name: 'Заказы', cat: 'orders', children: [
      { name: 'Создание' }, { name: 'Статусы' }, { name: 'Добавление после' },
      { name: 'История' }, { name: 'Замена товара' }, { name: 'Возврат и отмена' }, { name: 'Event Sourcing' }
    ]},
    { name: 'Доставка', cat: 'delivery', children: [
      { name: 'Временные слоты' }, { name: 'Dispatch' }, { name: 'ETA' }, { name: 'Трекинг' }, { name: 'Можно раньше' }
    ]},
    { name: 'Платежи', cat: 'payments', children: [
      { name: 'Т-Банк' }, { name: 'СБП' }, { name: 'Карта курьеру' },
      { name: 'Наличные' }, { name: 'Refund' }, { name: 'Чек (54-ФЗ)' }
    ]},
    { name: 'Уведомления', cat: 'notify', children: [
      { name: 'Push (FCM)' }, { name: 'SMS' }, { name: 'Email' }, { name: 'Telegram' }, { name: 'События' }
    ]},
    { name: 'Админка', cat: 'admin', children: [
      { name: 'Упр. заказами' }, { name: 'Упр. товарами' }, { name: 'Пользователи' },
      { name: 'Промокоды' }, { name: 'Курьеры и пикеры' }, { name: 'Магазины' },
      { name: 'Упр. сетями' }, { name: 'Audit log' }
    ]},
    { name: 'B2B', cat: 'b2b', children: [
      { name: 'Корп. заказы' }, { name: 'Регулярные поставки' }, { name: 'Индивид. цены' },
      { name: 'Отсрочка платежа' }, { name: 'ЭДО' }, { name: 'Счета и документы' }
    ]},
    { name: 'Dynamic Pricing', cat: 'pricing', children: [
      { name: 'Факторы' }, { name: 'Формула' }, { name: 'Max 2×' }, { name: 'Отображение' }
    ]},
    { name: 'Приложение пикера', cat: 'picker', children: [
      { name: 'FIFO' }, { name: 'Сканер' }, { name: 'Замены' },
      { name: 'Звонок клиенту' }, { name: 'Offline' }, { name: 'Smart Sync' }, { name: 'Упаковка' }
    ]},
    { name: 'Приложение курьера', cat: 'courier', children: [
      { name: 'Multi-stop' }, { name: 'Offline' }, { name: 'Off-route' },
      { name: 'Оплата' }, { name: 'Digital Signature' }, { name: 'Photo POD' },
      { name: 'Сканер' }, { name: 'Статусы' }
    ]},
    { name: 'Инфраструктура', cat: 'infra', children: [
      { name: 'CI/CD' }, { name: 'Docker/K8s' }, { name: 'Мониторинг' },
      { name: 'Sentry' }, { name: 'Feature flags' }, { name: 'Rollback' }
    ]},
    { name: 'Тестирование', cat: 'testing', children: [
      { name: 'Unit' }, { name: 'Integration' }, { name: 'Contract' }, { name: 'E2E' }, { name: 'Load' }, { name: 'Security' }
    ]},
    { name: 'Аналитика', cat: 'analytics', children: [
      { name: 'Дашборды' }, { name: 'Отчёты' }, { name: 'Метрики' }
    ]}
  ]
};

var width = window.innerWidth;
var height = window.innerHeight - 44;

var svg = d3.select('#chart')
  .attr('viewBox', [0, 0, width, height]);

var root = d3.hierarchy(DATA)
  .sum(function(d) { return d.children ? 0 : 1; })
  .sort(function(a, b) { return b.value - a.value; });

d3.treemap()
  .size([width, height])
  .paddingOuter(6)
  .paddingTop(24)
  .paddingInner(3)
  .round(true)(root);

var color = d3.scaleOrdinal()
  .domain(DATA.children.map(function(d) { return d.name; }))
  .range(CATEGORIES.map(function(c) { return c.color; }));

var tooltip = document.getElementById('tooltip');

var cell = svg.selectAll('g')
  .data(root.leaves())
  .join('g')
  .attr('transform', function(d) { return 'translate(' + d.x0 + ',' + d.y0 + ')'; });

cell.append('rect')
  .attr('width', function(d) { return d.x1 - d.x0; })
  .attr('height', function(d) { return d.y1 - d.y0; })
  .style('fill', function(d) {
    var p = d;
    while (p.depth > 1) p = p.parent;
    return color(p.data.name);
  })
  .style('opacity', function(d) { return d.y1 - d.y0 > 20 ? 0.8 : 0.6; })
  .on('mouseenter', function(e, d) {
    tooltip.innerHTML = '<div class="tt-name">' + d.data.name + '</div>';
    tooltip.classList.add('show');
  })
  .on('mousemove', function(e) {
    var x = e.clientX + 12;
    var y = e.clientY - 8;
    var r = tooltip.getBoundingClientRect();
    if (x + r.width > window.innerWidth - 8) x = e.clientX - r.width - 12;
    tooltip.style.left = x + 'px';
    tooltip.style.top = y + 'px';
  })
  .on('mouseleave', function() { tooltip.classList.remove('show'); });

cell.append('text')
  .attr('x', 4)
  .attr('y', 14)
  .style('fill', '#fff')
  .style('font-size', function(d) {
    var w = d.x1 - d.x0;
    return w < 60 ? '8px' : w < 100 ? '10px' : '11px';
  })
  .style('font-weight', '600')
  .style('pointer-events', 'none')
  .style('text-shadow', '0 1px 3px rgba(0,0,0,0.8)')
  .text(function(d) { return d.data.name; });

// Category labels
svg.selectAll('.cat-label')
  .data(root.children)
  .join('text')
  .attr('class', 'cat-label')
  .attr('x', function(d) { return d.x0 + 6; })
  .attr('y', function(d) { return d.y0 + 16; })
  .style('fill', '#fff')
  .style('font-size', '12px')
  .style('font-weight', '700')
  .style('pointer-events', 'none')
  .style('text-shadow', '0 1px 4px rgba(0,0,0,0.9)')
  .text(function(d) {
    var count = d.children ? d.children.length : 0;
    return d.data.name + ' (' + count + ')';
  });
</script>
</body>
</html>
