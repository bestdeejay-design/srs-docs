<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Treemap — Карта функций</title>
<script src="https://cdn.jsdelivr.net/npm/d3@7/dist/d3.min.js"></script>
<style>
* { margin: 0; padding: 0; box-sizing: border-box }
body { background: #0a0a0f; color: #e8e8ed; font-family: -apple-system, BlinkMacSystemFont, Inter, sans-serif; height: 100vh; display: flex; flex-direction: column; overflow: hidden }
h1 { text-align: center; padding: 10px; font-size: 14px; font-weight: 600; color: #6b6b83; letter-spacing: 0.5px; flex-shrink: 0 }
svg { flex: 1; display: block; width: 100%; height: 100% }
.tooltip { position: fixed; display: none; background: #12121a; border: 1px solid #262636; border-radius: 8px; padding: 8px 12px; font-size: 12px; max-width: 260px; pointer-events: none; z-index: 1000; backdrop-filter: blur(12px) }
.tooltip.show { display: block }
.tooltip .tt-name { font-weight: 700; font-size: 13px; margin-bottom: 2px }
.tooltip .tt-desc { color: #6b6b83; font-size: 11px }
.hint { position: fixed; top: 52px; left: 50%; transform: translateX(-50%); font-size: 11px; color: #6b6b83; background: #12121ab0; padding: 4px 14px; border-radius: 12px; border: 1px solid #262636; z-index: 100; backdrop-filter: blur(8px); pointer-events: none; opacity: 0; transition: opacity .5s }
.hint.show { opacity: 1 }
rect { cursor: pointer; transition: opacity .12s }
rect:hover { opacity: 0.85; stroke: #fff; stroke-width: 1.5 }
</style>
</head>
<body>
<h1>🧩 Treemap — Карта функциональных требований</h1>
<svg id="chart"></svg>
<div class="hint" id="hint">Наведите на прямоугольник для просмотра · кликните чтобы увеличить категорию</div>
<div id="tooltip" class="tooltip"></div>
<script>
var CATEGORIES = [
  { id: 'security',  name: 'Регистрация и безопасность', color: '#6366f1' },
  { id: 'catalog',   name: 'Каталог',                    color: '#22c55e' },
  { id: 'cart',      name: 'Корзина',                    color: '#f59e0b' },
  { id: 'orders',    name: 'Заказы',                     color: '#ef4444' },
  { id: 'delivery',  name: 'Доставка',                   color: '#3b82f6' },
  { id: 'payments',  name: 'Платежи',                    color: '#8b5cf6' },
  { id: 'notify',    name: 'Уведомления',                color: '#06b6d4' },
  { id: 'admin',     name: 'Админка',                    color: '#f97316' },
  { id: 'b2b',       name: 'B2B',                        color: '#14b8a6' },
  { id: 'pricing',   name: 'Dynamic Pricing',            color: '#ec4899' },
  { id: 'picker',    name: 'Приложение пикера',          color: '#84cc16' },
  { id: 'courier',   name: 'Приложение курьера',         color: '#0ea5e9' },
  { id: 'infra',     name: 'Инфраструктура',             color: '#64748b' },
  { id: 'testing',   name: 'Тестирование',               color: '#a855f7' },
  { id: 'analytics', name: 'Аналитика',                  color: '#10b981' }
];
var catMap = {};
CATEGORIES.forEach(function(c) { catMap[c.id] = c; });

var RAW = [
  { id: 'security',  name: 'Регистрация и безопасность', features: ['Вход по телефону', 'SMS-подтверждение', 'Роли (RBAC)', 'JWT токены', 'Rate limiting', 'Audit log'] },
  { id: 'catalog',   name: 'Каталог',                    features: ['Выбор магазина', 'Категории', 'Поиск (ES)', 'Фильтры', 'Карточка товара', 'Нормализация', 'Маппинг', 'Адаптеры', 'Синхронизация'] },
  { id: 'cart',      name: 'Корзина',                    features: ['Добавление', 'Промокоды', 'Dynamic Pricing', 'Пересчёт', 'Оформление'] },
  { id: 'orders',    name: 'Заказы',                     features: ['Создание', 'Статусы', 'Добавление после', 'История', 'Замена', 'Возврат', 'Event Sourcing'] },
  { id: 'delivery',  name: 'Доставка',                   features: ['Слоты', 'Dispatch', 'ETA', 'Трекинг', 'Можно раньше'] },
  { id: 'payments',  name: 'Платежи',                    features: ['Т-Банк', 'СБП (QR)', 'Карта курьеру', 'Наличные', 'Refund', 'Чек (54-ФЗ)'] },
  { id: 'notify',    name: 'Уведомления',                features: ['Push (FCM)', 'SMS', 'Email', 'Telegram', 'События'] },
  { id: 'admin',     name: 'Админка',                    features: ['Заказы', 'Товары', 'Пользователи', 'Промокоды', 'Курьеры', 'Магазины', 'Сети', 'Audit log'] },
  { id: 'b2b',       name: 'B2B',                        features: ['Корп. заказы', 'Регулярные', 'Цены', 'Отсрочка', 'ЭДО', 'Счета'] },
  { id: 'pricing',   name: 'Dynamic Pricing',            features: ['Факторы', 'Формула', 'Max 2×', 'Отображение'] },
  { id: 'picker',    name: 'Приложение пикера',          features: ['FIFO', 'Сканер', 'Замены', 'Звонок', 'Offline', 'Smart Sync', 'Упаковка'] },
  { id: 'courier',   name: 'Приложение курьера',         features: ['Multi-stop', 'Offline', 'Off-route', 'Оплата', 'Digital Sign.', 'Photo POD', 'Сканер', 'Статусы'] },
  { id: 'infra',     name: 'Инфраструктура',             features: ['CI/CD', 'Docker/K8s', 'Мониторинг', 'Sentry', 'Feature flags', 'Rollback'] },
  { id: 'testing',   name: 'Тестирование',               features: ['Unit', 'Integration', 'Contract', 'E2E', 'Load', 'Security'] },
  { id: 'analytics', name: 'Аналитика',                  features: ['Дашборды', 'Отчёты', 'Метрики'] }
];

var w = window.innerWidth;
var h = window.innerHeight - 44;

var svg = d3.select('#chart');
var g = svg.append('g');

var tooltip = document.getElementById('tooltip');
var hint = document.getElementById('hint');
setTimeout(function() { hint.classList.add('show'); }, 500);
setTimeout(function() { hint.classList.remove('show'); }, 4000);

function render(zoomCat) {
  g.selectAll('*').remove();
  svg.attr('viewBox', [0, 0, w, h]);

  var data;
  if (zoomCat) {
    var mod = RAW.find(function(m) { return m.id === zoomCat; });
    data = { name: mod.name, children: mod.features.map(function(f) { return { name: f }; }) };
  } else {
    data = {
      name: 'Продукт',
      children: RAW.map(function(m) {
        return { name: m.name, cat: m.id, children: m.features.map(function(f) { return { name: f, cat: m.id }; }) };
      })
    };
  }

  var root = d3.hierarchy(data)
    .sum(function(d) { return d.children ? 0 : 1; })
    .sort(function(a, b) { return b.value - a.value; });

  d3.treemap()
    .size([w, h])
    .paddingOuter(4)
    .paddingTop(zoomCat ? 0 : 22)
    .paddingInner(2)
    .round(true)(root);

  if (zoomCat) {
    // Zoomed view: show features as main rects
    var leaves = root.leaves();
    var color = catMap[zoomCat] ? catMap[zoomCat].color : '#6366f1';

    g.selectAll('rect')
      .data(leaves)
      .join('rect')
      .attr('x', function(d) { return d.x0; })
      .attr('y', function(d) { return d.y0; })
      .attr('width', function(d) { return d.x1 - d.x0; })
      .attr('height', function(d) { return d.y1 - d.y0; })
      .style('fill', color)
      .style('stroke', '#0a0a0f')
      .style('stroke-width', 1)
      .style('opacity', 0.75)
      .on('mouseenter', function(e, d) {
        tooltip.innerHTML = '<div class="tt-name">' + d.data.name + '</div>';
        tooltip.classList.add('show');
        d3.select(this).style('opacity', 1).style('stroke', '#fff');
      })
      .on('mousemove', function(e) {
        tooltip.style.left = (e.clientX + 12) + 'px';
        tooltip.style.top = (e.clientY - 8) + 'px';
      })
      .on('mouseleave', function() {
        tooltip.classList.remove('show');
        d3.select(this).style('opacity', 0.75).style('stroke', '#0a0a0f');
      });

    g.selectAll('text')
      .data(leaves)
      .join('text')
      .attr('x', function(d) { return d.x0 + 4; })
      .attr('y', function(d) { return d.y0 + 14; })
      .style('fill', '#fff')
      .style('font-size', function(d) {
        var w2 = d.x1 - d.x0;
        return w2 < 70 ? '9px' : '11px';
      })
      .style('font-weight', '600')
      .style('pointer-events', 'none')
      .style('text-shadow', '0 1px 3px rgba(0,0,0,0.8)')
      .text(function(d) { return d.data.name; });

    // Back button
    g.append('text')
      .attr('x', 10)
      .attr('y', 20)
      .style('fill', '#6366f1')
      .style('font-size', '13px')
      .style('font-weight', '700')
      .style('cursor', 'pointer')
      .style('text-shadow', '0 1px 4px rgba(0,0,0,0.9)')
      .text('← Назад ко всем модулям')
      .on('click', function() { render(null); });

  } else {
    // Normal view: modules as groups
    var modules = root.children || [];

    modules.forEach(function(m) {
      var cat = catMap[m.data.cat];
      var color = cat ? cat.color : '#6366f1';

      // Module background
      g.append('rect')
        .attr('x', m.x0)
        .attr('y', m.y0)
        .attr('width', m.x1 - m.x0)
        .attr('height', m.y1 - m.y0)
        .style('fill', 'transparent')
        .style('stroke', color)
        .style('stroke-width', 1.5)
        .style('stroke-opacity', 0.5)
        .style('rx', 4);

      // Module label
      g.append('text')
        .attr('x', m.x0 + 6)
        .attr('y', m.y0 + 16)
        .style('fill', color)
        .style('font-size', '11px')
        .style('font-weight', '700')
        .style('pointer-events', 'none')
        .style('text-shadow', '0 1px 4px rgba(0,0,0,0.9)')
        .text(m.data.name + ' (' + (m.value || 0) + ')');

      // Features inside module
      if (m.children) {
        m.children.forEach(function(f) {
          g.append('rect')
            .attr('x', f.x0)
            .attr('y', f.y0)
            .attr('width', f.x1 - f.x0)
            .attr('height', f.y1 - f.y0)
            .style('fill', color)
            .style('stroke', '#0a0a0f')
            .style('stroke-width', 0.5)
            .style('opacity', 0.6)
            .style('rx', 2)
            .on('mouseenter', function(e) {
              tooltip.innerHTML = '<div class="tt-name">' + f.data.name + '</div>';
              tooltip.classList.add('show');
              d3.select(this).style('opacity', 0.9).style('stroke', '#fff');
            })
            .on('mousemove', function(e) {
              tooltip.style.left = (e.clientX + 12) + 'px';
              tooltip.style.top = (e.clientY - 8) + 'px';
            })
            .on('mouseleave', function() {
              tooltip.classList.remove('show');
              d3.select(this).style('opacity', 0.6).style('stroke', '#0a0a0f');
            });

          // Feature label
          var fw = f.x1 - f.x0;
          if (fw > 50) {
            g.append('text')
              .attr('x', f.x0 + 3)
              .attr('y', f.y0 + 12)
              .style('fill', '#fff')
              .style('font-size', '8px')
              .style('pointer-events', 'none')
              .style('text-shadow', '0 1px 2px rgba(0,0,0,0.8)')
              .text(f.data.name.length > 12 ? f.data.name.slice(0, 11) + '…' : f.data.name);
          }
        });

        // Click on module to zoom
        g.append('rect')
          .attr('x', m.x0)
          .attr('y', m.y0)
          .attr('width', m.x1 - m.x0)
          .attr('height', m.y1 - m.y0)
          .style('fill', 'transparent')
          .style('stroke', 'none')
          .style('cursor', 'pointer')
          .on('click', function() { render(m.data.cat); });
      }
    });
  }
}

render(null);

window.addEventListener('resize', function() {
  w = window.innerWidth;
  h = window.innerHeight - 44;
  render(null);
});
</script>
</body>
</html>
