<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Roadmap — Карта функций</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box }
body { background: #0a0a0f; color: #e8e8ed; font-family: -apple-system, BlinkMacSystemFont, Inter, sans-serif; height: 100vh; display: flex; flex-direction: column; overflow: hidden }
h1 { text-align: center; padding: 12px; font-size: 14px; font-weight: 600; color: #6b6b83; letter-spacing: 0.5px; flex-shrink: 0 }
.scroll-wrap { overflow-x: auto; overflow-y: auto; flex: 1; padding: 20px }
.roadmap { display: flex; gap: 20px; min-height: 100%; min-width: max-content }
.phase { background: #12121a; border: 1px solid #262636; border-radius: 12px; width: 280px; flex-shrink: 0; display: flex; flex-direction: column }
.phase-header { padding: 14px 16px; border-bottom: 1px solid #262636; font-weight: 700; font-size: 13px; display: flex; align-items: center; gap: 8px; flex-shrink: 0 }
.phase-header .dot { width: 10px; height: 10px; border-radius: 50%; flex-shrink: 0 }
.phase-header .count { font-size: 11px; color: #6b6b83; font-weight: 400; margin-left: auto }
.phase-body { padding: 8px; flex: 1; display: flex; flex-direction: column; gap: 6px }
.module-card { background: #1c1c2a; border: 1px solid #262636; border-radius: 8px; padding: 10px 12px; cursor: pointer; transition: border-color .15s, background .15s }
.module-card:hover { border-color: rgba(255,255,255,0.2); background: #22223a }
.module-card .m-title { font-weight: 600; font-size: 12px; margin-bottom: 2px }
.module-card .m-desc { font-size: 10px; color: #6b6b83; margin-bottom: 6px }
.module-card .m-features { display: flex; flex-wrap: wrap; gap: 3px }
.module-card .m-features span { font-size: 9px; padding: 1px 6px; border-radius: 4px; background: rgba(255,255,255,0.06); color: #6b6b83 }
.tooltip { position: fixed; display: none; background: #12121a; border: 1px solid #262636; border-radius: 8px; padding: 8px 12px; font-size: 12px; max-width: 240px; pointer-events: none; z-index: 1000 }
.tooltip.show { display: block }
.tooltip .tt-name { font-weight: 700; font-size: 13px; margin-bottom: 2px }
.tooltip .tt-desc { color: #6b6b83; font-size: 11px }
.legend-bar { display: flex; gap: 16px; padding: 10px 20px; flex-shrink: 0; justify-content: center; border-top: 1px solid #262636; font-size: 11px; color: #6b6b83; flex-wrap: wrap }
.legend-bar .lg-item { display: flex; align-items: center; gap: 6px }
.legend-bar .lg-dot { width: 8px; height: 8px; border-radius: 50% }
</style>
</head>
<body>
<h1>🗺 Roadmap — Дорожная карта продукта</h1>
<div class="scroll-wrap">
<div class="roadmap" id="roadmap"></div>
</div>
<div class="legend-bar" id="legendBar"></div>
<div id="tooltip" class="tooltip"></div>

<script>
var MODULES = [
  { name: '🔐 Регистрация и безопасность', color: '#6366f1', phase: 'mvp', desc: 'Аутентификация, RBAC, JWT', features: ['Вход по телефону', 'SMS', 'Роли (5)', 'JWT', 'Rate limiting', 'Audit log'] },
  { name: '🛒 Каталог', color: '#22c55e', phase: 'mvp', desc: 'Товары, категории, поиск, адаптеры', features: ['Выбор магазина', 'Категории', 'Поиск (ES)', 'Фильтры', 'Карточка', 'Нормализация', 'Маппинг', 'Адаптеры', 'Синхронизация'] },
  { name: '🧺 Корзина', color: '#f59e0b', phase: 'mvp', desc: 'Добавление, промокоды, оформление', features: ['Добавление', 'Промокоды', 'Dynamic Pricing', 'Пересчёт', 'Оформление'] },
  { name: '📋 Заказы', color: '#ef4444', phase: 'mvp', desc: 'Жизненный цикл, статусы, возвраты', features: ['Создание', 'Статусы', 'Добавление после', 'История', 'Замена', 'Возврат'] },
  { name: '🚚 Доставка', color: '#3b82f6', phase: 'mvp', desc: 'Слоты, маршрутизация, ETA, трекинг', features: ['Слоты', 'Dispatch', 'ETA', 'Трекинг'] },
  { name: '💳 Платежи', color: '#8b5cf6', phase: 'mvp', desc: 'Онлайн, СБП, POS, наличные', features: ['Т-Банк', 'СБП (QR)', 'Карта курьеру', 'Наличные', 'Refund', 'Чек (54-ФЗ)'] },
  { name: '📱 Приложение пикера', color: '#84cc16', phase: 'v2', desc: 'Сборка заказов, сканер, offline', features: ['FIFO', 'Сканер', 'Замены', 'Звонок', 'Offline', 'Smart Sync', 'Упаковка'] },
  { name: '🚀 Приложение курьера', color: '#0ea5e9', phase: 'v2', desc: 'Навигация, оплата, POD, offline', features: ['Multi-stop', 'Offline', 'Off-route', 'Оплата', 'Digital Sign.', 'Photo POD', 'Сканер', 'Статусы'] },
  { name: '🔔 Уведомления', color: '#06b6d4', phase: 'v2', desc: 'Push, SMS, Email, Telegram', features: ['Push (FCM)', 'SMS', 'Email', 'Telegram', 'События'] },
  { name: '⚙️ Админка', color: '#f97316', phase: 'v2', desc: 'Управление заказами, товарами, юзерами', features: ['Заказы', 'Товары', 'Пользователи', 'Промокоды', 'Курьеры', 'Магазины', 'Сети', 'Audit log'] },
  { name: '🏢 B2B', color: '#14b8a6', phase: 'v3', desc: 'Корп. заказы, ЭДО, отсрочка', features: ['Корп. заказы', 'Регулярные', 'Индивид. цены', 'Отсрочка', 'ЭДО', 'Счета'] },
  { name: '💰 Dynamic Pricing', color: '#ec4899', phase: 'v3', desc: 'Факторы, мультипликативная модель', features: ['Факторы', 'Формула', 'Max 2×', 'Отображение'] },
  { name: '🏗️ Инфраструктура', color: '#64748b', phase: 'v3', desc: 'CI/CD, K8s, мониторинг', features: ['CI/CD', 'Docker/K8s', 'Мониторинг', 'Sentry', 'Feature flags', 'Rollback'] },
  { name: '🧪 Тестирование', color: '#a855f7', phase: 'v3', desc: 'Unit, Integration, E2E, Load', features: ['Unit', 'Integration', 'Contract', 'E2E', 'Load', 'Security'] },
  { name: '📊 Аналитика', color: '#10b981', phase: 'v3', desc: 'Дашборды, отчёты, метрики', features: ['Дашборды', 'Отчёты', 'Метрики'] },
  { name: '📋 Event Sourcing', color: '#ef4444', phase: 'future', desc: 'Цепочка событий для аудита', features: ['Event Sourcing'] },
  { name: '🎯 Опция "Можно раньше"', color: '#3b82f6', phase: 'future', desc: 'Раннее получение заказа', features: ['Можно раньше'] }
];

var PHASES = [
  { id: 'mvp', name: 'MVP — Запуск', sub: '1-3 месяц', color: '#22c55e' },
  { id: 'v2', name: 'V2 — Рост', sub: '3-6 месяц', color: '#f59e0b' },
  { id: 'v3', name: 'V3 — Масштабирование', sub: '6-12 месяц', color: '#6366f1' },
  { id: 'future', name: 'Будущее', sub: '12+ месяц', color: '#6b6b83' }
];

var tooltip = document.getElementById('tooltip');
var roadmap = document.getElementById('roadmap');
var legendBar = document.getElementById('legendBar');

// Legend
PHASES.forEach(function(p) {
  var item = document.createElement('div');
  item.className = 'lg-item';
  item.innerHTML = '<span class="lg-dot" style="background:' + p.color + '"></span>' + p.name + ' (' + p.sub + ')';
  legendBar.appendChild(item);
});

PHASES.forEach(function(phase) {
  var col = document.createElement('div');
  col.className = 'phase';
  col.innerHTML = '<div class="phase-header"><span class="dot" style="background:' + phase.color + '"></span>' + phase.name + '<span class="count">' + phase.sub + '</span></div>';
  var body = document.createElement('div');
  body.className = 'phase-body';

  var mods = MODULES.filter(function(m) { return m.phase === phase.id; });
  mods.forEach(function(m) {
    var card = document.createElement('div');
    card.className = 'module-card';
    card.innerHTML = '<div class="m-title" style="color:' + m.color + '">' + m.name + '</div>'
      + '<div class="m-desc">' + m.desc + '</div>'
      + '<div class="m-features">' + m.features.map(function(f) { return '<span>' + f + '</span>'; }).join('') + '</div>';
    card.addEventListener('mouseenter', function(e) {
      tooltip.innerHTML = '<div class="tt-name">' + m.name + '</div><div class="tt-desc">' + m.features.length + ' функций</div>';
      tooltip.classList.add('show');
    });
    card.addEventListener('mousemove', function(e) {
      tooltip.style.left = (e.clientX + 12) + 'px';
      tooltip.style.top = (e.clientY - 8) + 'px';
    });
    card.addEventListener('mouseleave', function() { tooltip.classList.remove('show'); });
    body.appendChild(card);
  });

  col.appendChild(body);
  roadmap.appendChild(col);
});
</script>
</body>
</html>
