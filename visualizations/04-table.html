<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">

<title>Таблица — Карта функций</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box }
body { background: #0a0a0f; color: #e8e8ed; font-family: -apple-system, BlinkMacSystemFont, Inter, sans-serif; min-height: 100vh }
h1 { text-align: center; padding: 16px; font-size: 14px; font-weight: 600; color: #6b6b83; letter-spacing: 0.5px }
table { width: 100%; border-collapse: collapse; font-size: 13px }
th { position: sticky; top: 0; background: #12121a; color: #6b6b83; font-weight: 600; font-size: 11px; text-transform: uppercase; letter-spacing: 0.5px; padding: 10px 16px; text-align: left; border-bottom: 1px solid #262636; z-index: 10 }
td { padding: 6px 16px; border-bottom: 1px solid #1a1a28; vertical-align: top }
tr:hover td { background: rgba(255,255,255,0.03) }
tr.category td { background: #12121a; font-weight: 700; font-size: 14px; cursor: pointer; border-bottom: 1px solid #262636 }
tr.category:hover td { background: #1c1c2a }
tr.category .toggle { display: inline-block; width: 20px; color: #6b6b83; transition: transform .15s }
tr.category.collapsed .toggle { transform: rotate(-90deg) }
tr.feature { transition: background .15s }
tr.feature.hidden { display: none }
.badge { display: inline-block; padding: 1px 8px; border-radius: 10px; font-size: 10px; font-weight: 600; color: #fff }
.count-badge { font-size: 10px; color: #6b6b83; margin-left: 8px }
.search-wrap { position: sticky; top: 0; z-index: 20; background: #0a0a0f; padding: 12px 16px; border-bottom: 1px solid #262636 }
.search-wrap input { width: 100%; max-width: 400px; padding: 8px 14px; border: 1px solid #262636; border-radius: 8px; background: #12121a; color: #e8e8ed; font-size: 13px; outline: none }
.search-wrap input:focus { border-color: #6366f1 }
.search-wrap input::placeholder { color: #6b6b83 }
.summary { padding: 8px 16px; font-size: 11px; color: #6b6b83; border-bottom: 1px solid #262636 }
</style>
</head>

  ]},
  { cat: 'admin', items: [
    { name: 'Управление заказами', desc: 'CRUD, смена статусов, комментарии', priority: 'Высокий' },
    { name: 'Управление товарами', desc: 'CRUD, импорт/экспорт CSV', priority: 'Высокий' },
    { name: 'Пользователи', desc: 'Блокировка, роли, активность', priority: 'Высокий' },
    { name: 'Промокоды', desc: 'Создание, статистика, срок действия', priority: 'Средний' },
    { name: 'Курьеры и пикеры', desc: 'Назначение зон, рейтинг, график', priority: 'Средний' },
    { name: 'Магазины и зоны', desc: 'Управление магазинами и полигонами', priority: 'Средний' },
    { name: 'Управление сетями', desc: 'Включение/отключение адаптеров', priority: 'Средний' },

  ]},

  ]},

  ]},

    { name: 'Contract', desc: 'Pact CDC', priority: 'Средний' },
    { name: 'E2E', desc: 'Cypress + K6', priority: 'Средний' },

  ]},

  ]}
];

var catLookup = {};
CATEGORIES.forEach(function(c) { catLookup[c.id] = c; });

var tbody = document.getElementById('tbody');
var PRIORITY_COLORS = { 'Высокий': '#22c55e', 'Средний': '#f59e0b', 'Низкий': '#6b6b83' };

function render(searchQuery) {
  var q = (searchQuery || '').toLowerCase().trim();
  var html = '';
  var totalFeatures = 0;
  var visibleCategories = 0;

  DATA.forEach(function(group) {
    var cat = catLookup[group.cat];
    var filtered = group.items;
    if (q.length >= 2) {
      filtered = group.items.filter(function(f) {
        return f.name.toLowerCase().indexOf(q) !== -1 || f.desc.toLowerCase().indexOf(q) !== -1;
      });
    }
    if (filtered.length === 0) return;
    visibleCategories++;
    totalFeatures += filtered.length;

    html += '<tr class="category" data-cat="' + group.cat + '">'
      + '<td><span class="toggle">▼</span></td>'
      + '<td><span class="badge" style="background:' + cat.color + '">' + cat.name + '</span>'
      + '<span class="count-badge">' + filtered.length + ' фич</span></td>'
      + '<td colspan="2"></td></tr>';

    filtered.forEach(function(f) {
      html += '<tr class="feature" data-cat="' + group.cat + '">'
        + '<td></td>'
        + '<td style="padding-left:32px">' + f.name + '</td>'
        + '<td style="color:#6b6b83;font-size:12px">' + f.desc + '</td>'
        + '<td><span style="color:' + (PRIORITY_COLORS[f.priority] || '#6b6b83') + ';font-size:11px">● ' + f.priority + '</span></td>'
        + '</tr>';
    });
  });

  tbody.innerHTML = html;
  document.getElementById('summary').textContent = totalFeatures + ' функций · ' + visibleCategories + ' модулей';

  // Collapse toggle
  tbody.querySelectorAll('.category').forEach(function(row) {
    row.addEventListener('click', function() {
      var cat = this.getAttribute('data-cat');
      this.classList.toggle('collapsed');
      tbody.querySelectorAll('.feature[data-cat="' + cat + '"]').forEach(function(f) {
        f.classList.toggle('hidden');
      });
    });
  });
}

render('');
document.getElementById('search').addEventListener('input', function() {
  render(this.value);
});
</script>
